<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>电商AI客服助手</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero card">
        <div class="hero-top">
          <h1>电商AI客服助手</h1>
          <span class="pill">本地处理</span>
        </div>
        <p class="hero-sub">不自动发送，只给建议话术，人工确认后粘贴发送。</p>
        <div class="workflow">
          <span>1 捕捉消息</span>
          <span>2 选语气</span>
          <span>3 生成并复制</span>
        </div>
      </header>

      <section class="card">
        <div class="title-row">
          <h2>买家最新消息</h2>
          <span id="sceneLabel" class="scene-tag">场景：未识别</span>
        </div>
        <p id="latestMessage" class="buyer-message">暂无用户消息，请在淘宝/闲鱼/飞猪客服页等待新消息。</p>
      </section>

      <section class="card">
        <div class="title-row">
          <h2>快速回复</h2>
          <span class="quick-tag">高频操作</span>
        </div>
        <div class="tone-group">
          <button class="tone-btn is-active" type="button" data-tone="professional">专业</button>
          <button class="tone-btn" type="button" data-tone="friendly">亲和</button>
          <button class="tone-btn" type="button" data-tone="firm">强硬</button>
        </div>

        <div class="switch-group">
          <label class="switch-row">
            <input id="autoGenerateEnabled" type="checkbox" />
            <span>收到新消息后自动生成建议</span>
          </label>
          <label class="switch-row">
            <input id="autoCopyEnabled" type="checkbox" />
            <span>生成后自动复制到剪贴板</span>
          </label>
        </div>

        <div class="primary-actions">
          <button id="generateAndCopyBtn" class="btn btn-primary" type="button">生成并复制</button>
          <button id="generateBtn" class="btn" type="button">仅生成</button>
        </div>
        <p class="shortcut-hint">快捷键：Enter 仅生成，Ctrl/Cmd + Enter 生成并复制</p>
        <p id="statusLine" class="status-line">准备就绪</p>
      </section>

      <section class="card">
        <div class="title-row">
          <h2>建议话术</h2>
          <div class="title-actions">
            <span id="sourceTag" class="source-tag">规则引擎</span>
            <button id="copyBtn" class="btn btn-mini" type="button" disabled>复制当前</button>
          </div>
        </div>
        <div id="replyOutput" class="reply-output">点击“生成并复制”或“仅生成”后在此展示内容。</div>
        <div id="violationHint" class="violation-hint"></div>
      </section>

      <details class="card logs-card">
        <summary>最近操作（最近6条）</summary>
        <ul id="recentLogs" class="recent-log-list"></ul>
      </details>

      <section class="footer-actions">
        <button id="openSettingsBtn" class="btn btn-link" type="button">打开高级设置</button>
      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
